<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chukaev Lab | AI Ecosystem</title>
    
    <meta property="og:title" content="Chukaev Lab | AI Ecosystem">
    <meta property="og:description" content="Промпты, нейросети и автоматизация">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-bg: #131c31;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-glow: rgba(0, 242, 254, 0.15);
            
            /* Градиенты для кнопок */
            --grad-1: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --grad-2: linear-gradient(135deg, #2bd2ff 0%, #2b67ff 100%);
            --grad-dark: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* Аватар в стиле ИИ-интерфейса */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 24px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--grad-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .pulse-ring {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid #00f2fe;
            animation: pulse 2s infinite linear;
            opacity: 0.5;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        h1 {
            font-size: 24px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0 0 32px 0;
        }

        /* Сетка кнопок */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            position: relative;
            display: block;
            padding: 18px 24px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        /* Кнопка 1: Промпты (Акцентная) */
        .btn-prompts {
            background: var(--grad-1);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        /* Кнопка 2: Бот (Второй акцент) */
        .btn-bot {
            background: var(--grad-2);
            box-shadow: 0 4px 15px rgba(43, 103, 255, 0.3);
        }

        /* Кнопка 3: Резервная/Дополнительная */
        .btn-secondary {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Эффекты при ховере (для десктопа и плавности) */
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-tag {
            position: absolute;
            top: 0;
            right: 12px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            padding: 2px 6px;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-container">
            <div class="pulse-ring"></div>
            <div class="avatar">CL</div>
        </div>

        <h1>Chukaev Lab</h1>
        <div class="subtitle">AI-генерация, промпты и автоматизация</div>

        <div class="links-grid">
            <a href="https://telegram.me/ai_prompts_chukaev" class="btn btn-prompts" target="_blank">
                ТГ-Канал: Нейросети & Промпты
            </a>

            <a href="https://telegram.me/matrixai_robot?start=r-943037293" class="btn btn-bot" target="_blank">
                <span class="btn-tag">Запустить</span>
                Matrix AI Бот
            </a>

            <a href="https://telegram.me/ai_prompts_chukaev" class="btn btn-secondary" target="_blank">
                Основной Telegram-канал
            </a>
        </div>
    </div>

</body>
</html>
