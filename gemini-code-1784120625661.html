<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#040719">

    <title>ЧУКАЕВ ЛАБ | AI Ecosystem</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@500;600;700&family=Russo+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030518;
            --cyan: #27f5ff;
            --cyan-soft: rgba(39, 245, 255, 0.42);
            --cyan-dark: rgba(39, 245, 255, 0.12);
            --purple: #9a55ff;
            --purple-soft: rgba(154, 85, 255, 0.45);
            --purple-dark: rgba(154, 85, 255, 0.12);
            --white: #f8fbff;
            --muted: #b8c0d8;
            --content-width: 760px;
        }

        * { box-sizing: border-box; }

        html { min-height: 100%; background: var(--bg); }

        body {
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: var(--white);
            font-family: "Jura", sans-serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(25, 213, 255, 0.16), transparent 38%),
                radial-gradient(circle at 80% 55%, rgba(132, 59, 255, 0.15), transparent 38%),
                radial-gradient(circle at 10% 95%, rgba(0, 214, 255, 0.1), transparent 38%),
                linear-gradient(180deg, #020817 0%, #06051b 48%, #040316 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -4;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(40, 223, 255, 0.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(40, 223, 255, 0.075) 1px, transparent 1px);
            background-size: 42px 42px;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.48));
            mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.48));
            animation: gridMove 18s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -3;
            pointer-events: none;
            opacity: 0.2;
            background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(255,255,255,.025) 4px);
            animation: scanlines 12s linear infinite;
        }

        .ambient { position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
        .ambient::before, .ambient::after {
            content: ""; position: absolute; width: 480px; height: 480px; border-radius: 50%; filter: blur(100px); opacity: .17;
        }
        .ambient::before { top: -170px; left: -220px; background: var(--cyan); animation: ambientOne 11s ease-in-out infinite alternate; }
        .ambient::after { right: -240px; bottom: -170px; background: var(--purple); animation: ambientTwo 13s ease-in-out infinite alternate; }

        .page {
            width: min(100%, var(--content-width));
            min-height: 100vh;
            margin: 0 auto;
            padding: max(36px, env(safe-area-inset-top)) 24px max(44px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-zone {
            position: relative;
            width: 310px;
            height: 310px;
            margin-top: 4px;
            display: grid;
            place-items: center;
            filter: drop-shadow(0 0 22px rgba(35, 238, 255, .22)) drop-shadow(0 0 45px rgba(132, 70, 255, .14));
        }

        .logo-halo {
            position: absolute; width: 218px; height: 218px; border-radius: 50%;
            background: radial-gradient(circle, rgba(37,245,255,.18), transparent 66%);
            filter: blur(8px); animation: haloPulse 3.3s ease-in-out infinite;
        }

        .ring { position: absolute; border-radius: 50%; pointer-events: none; }
        .ring-a { width: 284px; height: 284px; border: 2px dashed rgba(37,245,255,.39); animation: rotateRight 18s linear infinite; }
        .ring-b { width: 252px; height: 252px; border: 4px solid transparent; border-top-color: var(--purple); border-right-color: rgba(39,245,255,.85); animation: rotateLeft 9s linear infinite; }
        .ring-c { width: 228px; height: 228px; border: 2px solid rgba(39,245,255,.2); border-left-color: transparent; border-right-color: transparent; animation: rotateRight 6.5s linear infinite; }

        .segment-ring {
            position: absolute; width: 270px; height: 270px; border-radius: 50%;
            background: conic-gradient(from 20deg, transparent 0deg 32deg, rgba(39,245,255,.95) 32deg 48deg, transparent 48deg 113deg, rgba(154,85,255,.9) 113deg 135deg, transparent 135deg 217deg, rgba(39,245,255,.85) 217deg 233deg, transparent 233deg 309deg, rgba(154,85,255,.9) 309deg 326deg, transparent 326deg);
            -webkit-mask: radial-gradient(circle, transparent 0 124px, #000 125px 134px, transparent 135px);
            mask: radial-gradient(circle, transparent 0 124px, #000 125px 134px, transparent 135px);
            animation: rotateRight 12s linear infinite;
        }

        .logo-frame {
            position: relative; width: 204px; height: 204px; z-index: 5; padding: 7px; border-radius: 50%;
            background: conic-gradient(from 0deg, var(--cyan), #8afaff, var(--purple), #e355ff, var(--cyan));
            box-shadow: 0 0 14px var(--cyan), 0 0 34px rgba(39,245,255,.48), 0 0 65px rgba(154,85,255,.25);
            animation: logoFloat 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite;
        }

        .logo-image { display: block; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #08122d; animation: imageBreath 5s ease-in-out infinite; }

        .title {
            margin: 2px 0 0; font-family: "Russo One", "Jura", sans-serif; font-size: clamp(38px, 8vw, 60px);
            letter-spacing: .075em; text-align: center; text-transform: uppercase;
            text-shadow: 0 0 5px #fff, 0 0 12px var(--cyan), 0 0 30px rgba(39,245,255,.62);
        }

        .subtitle { margin: 19px 0 48px; color: #d4d8ea; font-size: clamp(16px, 4vw, 24px); font-weight: 600; text-align: center; }

        .links { width: 100%; display: grid; gap: 26px; }

        .cyber-button {
            --accent: var(--cyan); --accent-soft: var(--cyan-soft); --accent-dark: var(--cyan-dark);
            position: relative; min-height: 132px; padding: 20px 31px 20px 24px; display: grid; grid-template-columns: 104px 1fr;
            align-items: center; gap: 25px; color: var(--white); text-decoration: none;
            background: linear-gradient(105deg, rgba(11,33,62,.93), rgba(10,17,44,.95) 56%, rgba(11,10,39,.96));
            border: 2px solid var(--accent); border-radius: 4px;
            clip-path: polygon(20px 0, calc(100% - 20px) 0, 100% 20px, 100% calc(100% - 20px), calc(100% - 20px) 100%, 20px 100%, 0 calc(100% - 20px), 0 20px);
            transition: transform .25s ease, filter .25s ease;
        }

        .cyber-button.purple { --accent: var(--purple); --accent-soft: var(--purple-soft); --accent-dark: var(--purple-dark); }
        .cyber-button.orange { --accent: #ffb703; --accent-soft: rgba(255, 183, 3, 0.4); --accent-dark: rgba(255, 183, 3, 0.1); }

        .circuit-lines {
            position: absolute; inset: 0; z-index: -1; opacity: .33; pointer-events: none;
            background: linear-gradient(90deg, transparent 0 42%, var(--accent-soft) 42% 42.5%, transparent 42.5% 100%), linear-gradient(0deg, transparent 0 72%, var(--accent-soft) 72% 73%, transparent 73% 100%);
        }

        .corner { position: absolute; width: 28px; height: 28px; border: 4px solid var(--accent); }
        .corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .corner-br { right: 0; bottom: 0; border-left: none; border-top: none; }

        .icon-wrap { position: relative; width: 104px; height: 88px; display: grid; place-items: center; border-right: 1px solid var(--accent-soft); }
        .icon-orbit { position: absolute; width: 78px; height: 78px; border: 1px solid var(--accent-soft); border-radius: 50%; animation: iconRotate 8s linear infinite; }
        .telegram-icon { width: 54px; height: 54px; }

        .button-title { display: block; font-size: clamp(20px, 4.3vw, 31px); font-weight: 700; text-transform: uppercase; line-height: 1.2; }
        .button-note { display: block; margin-top: 7px; color: var(--accent); font-size: 11px; font-weight: 700; text-transform: uppercase; }

        .launch-tag {
            position: absolute; top: -1px; right: 23px; z-index: 10; padding: 8px 14px;
            color: white; font-size: 11px; font-weight: 700; text-transform: uppercase;
            background: linear-gradient(180deg, #b980ff, #7433e9); border-radius: 0 0 7px 7px;
        }

        @keyframes rotateRight { to { transform: rotate(360deg); } }
        @keyframes rotateLeft { to { transform: rotate(-360deg); } }
        @keyframes gridMove { to { background-position: 42px 42px; } }
        @keyframes scanlines { to { transform: translateY(12px); } }
    </style>
</head>
